<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maazi.de LMU - Ergebnis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgba(51, 51, 51, 0.9);
      color: #000000;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      text-align: center;
      padding: 20px 20px;
      background: rgba(51, 51, 51, 0.9);
      border-bottom: 2px solid #666;
      color: #fff;
      height: auto;
    }

    header h1 {
      margin: 0;
      font-size: 3em;
      font-weight: bold;
    }

    header p {
      margin: 10px 0 0;
      font-size: 1.2em;
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 140px 20px 40px;
      flex: 1;
    }

    footer {
      bottom: 0px;
      left: 0;
      right: 0;
      position: fixed;
      text-align: center;
      padding: 20px;
      background: rgba(51, 51, 51, 0.9);
      border-top: 2px solid #666;
      color: #fff;
      z-index: 1000;
    }

    pre {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-wrap: break-word
    }
  </style>
</head>

<body>
  <header>
    <h1>Ergebnis</h1>
    <p>Evaluationsergebnis für das Simulationsszenario</p>
  </header>
  <div class="container">
    <pre id="result">{{ result or 'Keine Ergebnisse vorhanden.' }}</pre>
    <p><a href="/">Zurück</a></p>
  </div>
  <footer>
    <p>&copy; 2025 https://maazi.de/toolkit - LMU Klinikum - Chirurgische Technologische Innovationen</p>
  </footer>
</body>

</html>
