<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maazi.de LMU - Logs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgba(51, 51, 51, 0.9);
      color: #000000;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      text-align: center;
      padding: 20px 20px;
      background: rgba(51, 51, 51, 0.9);
      border-bottom: 2px solid #666;
      color: #fff;
      height: auto;
    }

    header h1 {
      margin: 0;
      font-size: 3em;
      font-weight: bold;
    }

    header p {
      margin: 10px 0 0;
      font-size: 1.2em;
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: 120px auto;
      padding: 20px
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff
    }

    th,
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee
    }

    a.btn {
      padding: 6px 10px;
      background: #4CAF50;
      color: #fff;
      border-radius: 6px;
      text-decoration: none
    }
  </style>
</head>

<body>
  <header>
    <h1>Trainings-Logs</h1>
    <p>Persistierte Evaluationsläufe</p>
  </header>
  <div class="container">
    {% if logs %}
    <table>
      <thead>
        <tr>
          <th>File</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody>
        {% for l in logs %}
        <tr>
          <td>{{ l }}</td>
          <td>
            <a class="btn" href="/sim_train/api/log/{{ l }}">Download</a>
            <a class="btn" href="/sim_train/api/log/{{ l }}" target="_blank">View</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p>Keine Logs vorhanden.</p>
    {% endif %}
    <p><a href="/sim_train/">Zurück zum Modul</a></p>
  </div>
</body>

</html>
