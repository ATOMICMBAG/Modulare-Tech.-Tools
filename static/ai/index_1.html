<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maazi - 1 panes</title>
    <style>
        /* Reset and full-height */
        html, body {
            height: 100%;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }

        /* Container: full viewport, zero gaps */
        .container {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 0;
        }

        /* Make any iframe fill its grid cell without borders/gaps */
        .container iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            margin: 0;
            padding: 0;
        }

        .container iframe:focus { outline: none; }
        .container iframe:focus-visible { outline: 2px solid rgba(0,0,0,0.2); }
    </style>
</head>

<body>

    <div class="container">
        <iframe src="./index_1b.html" id="ai-frame1" name="ai-frame1"  title="ai-frame1"></iframe>
    </div>

</body>

</html>
