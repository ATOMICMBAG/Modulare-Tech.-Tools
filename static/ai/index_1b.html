    <!-- Dropdown-Menü (AI Tools) -->

          <button style="flex: 1; text-align: center;" data-tab="search">

    </div>

    <!-- Hauptinhalt: inline, aber innerhalb von #ai-frame -->
    <!-- ACHTUNG: CSS positioniert #ai-frame absolut → daher padding-top nötig -->
    <div id="ai-frame" style="padding: 25px 25px; overflow-y: auto; height: 100%;">

      <div id="chat" class="tab-content active" style="padding: 1rem;">
        <h2 style="text-align: center;min-width: 300px; height: 55px;"> Chat AI Models </h2>
        <input type="text" id="searchInput" class="ai-open-btn" placeholder="⌕ Search" autocomplete="off"

        <div class="tool-grid" id="chat-grid"><!-- Chat AI Models -Inhalte -->
        </div>
        <div class="tool-grid" id="externchat-grid"><!-- Chat AI Models -Inhalte -->
        </div>
      </div>

      <div id="search" class="tab-content" style="padding: 1rem; display: none;">
        <h2 style="text-align: center;min-width: 300px; height: 55px;"> Search AI Models </h2>
        <input type="text" id="searchInput" class="ai-open-btn" placeholder="⌕ Search" autocomplete="off"
          style="width: 100% ;">
        <div class="tool-grid" id="search-grid"><!-- Search AI Models -Inhalte -->
        </div>
        <div class="tool-grid" id="externsearch-grid"><!-- Search AI Models -Inhalte -->
        </div>
      </div>

      <div id="local" class="tab-content" style="padding: 1rem; display: none;">
        <h2 style="text-align: center;min-width: 300px; height: 55px;"> local AI Model </h2>
        <input type="text" id="searchInput" class="ai-open-btn" placeholder="⌕ Search" autocomplete="off"
          style="width: 100% ;">
        <div class="tool-grid" id="local-grid"><!-- local AI Model -Inhalte -->
        </div>
      </div>

      <!-- Iframe-Viewer: wird eingeblendet, wenn ein Tool "frame" geöffnet wird -->
      <div id="iframe-viewer" style="display:none;">
        <div
          style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; padding: 1rem 0;">
          <!-- LINKS -->
          <div class="controls-left" style="flex: 1; text-align: center;">
          </div>
          <!-- MITTE -->
          <div class="controls-center" style="flex: 2; text-align: center;">
          </div>
          <!-- RECHTS -->
          <div class="controls-right" style="text-align: center;">
            <button class="ai-open-btn" onclick="closeFrame()">Close</button>
          </div>
        </div>

        <div style="background:#0b0b0b; border-radius:6px;">
          <iframe id="tool-frame" src="about:blank" height="800px" width="95%" referrerpolicy="no-referrer"
            style="border:1; background:#000;"></iframe>
        </div>
      </div>

      <div style="display: flex;">
        <div class="controls-left" style="flex: 1; min-width: 100px; min-height: 40px;">
        </div>
      </div>

    </div>

    <div style="display: flex;">

      { name: "ChatLima", url: "https://github.com/LMLK-seal/LLModel", cat: "local", open_iframe: "yes-open_no-iframe" },

      { name: "Rabbit Holes", url: "https://github.com/AsyncFuncAI/rabbitholes", cat: "local", open_iframe: "yes-open_no-iframe" },
      { name: "Ask PY", url: "https://github.com/pengfeng/ask.py", cat: "local", open_iframe: "yes-open_no-iframe" },
      { name: "Local Plexity", url: "https://github.com/legraphista/localplexity", cat: "local", open_iframe: "yes-open_no-iframe" },
      { name: "Scira", url: "https://openalternative.co/scira", cat: "local", open_iframe: "yes-open_no-iframe" },

      { name: "Langgraph AI", url: "https://github.com/langchain-ai/langgraph", cat: "local", open_iframe: "yes-open_no-iframe" },
    ];

    // === DOM-Referenzen ===
    const dropdownBtn = document.getElementById('dropdownButton');
    const dropdownContent = document.getElementById('dropdownContent');
    const searchInput = document.getElementById('searchInput');

    // === Dropdown Toggle ===
    dropdownBtn.addEventListener('click', () => {
      dropdownContent.classList.toggle('active');
      dropdownBtn.classList.toggle('active');
    });

    // === Tab-Wechsel ===
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(el => {
          el.style.display = 'none';
        });
        document.getElementById(tabId).style.display = 'block';
        dropdownContent.classList.remove('active');
        dropdownBtn.classList.remove('active');
      });
    });

    // === Vollbild ===
    function toggleFullscreen() {
      const container = document.getElementById('aiContainer');
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        container.classList.add('fullscreen');
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        container.classList.remove('fullscreen');
      }
      dropdownContent.classList.remove('active');
      dropdownBtn.classList.remove('active');
    }

    // === Menü-Icon öffnet Dropdown ===
    document.getElementById('menuToggle').addEventListener('click', () => {
      dropdownBtn.click();
    });

    // === Helfer: Öffnet Link im iframe-Viewer ===
    function openInFrame(url) {
      const viewer = document.getElementById('iframe-viewer');
      const frame = document.getElementById('tool-frame');
      viewer.style.display = 'block';
      frame.src = url;
      // Scroll viewer in Sicht (falls nötig)
      viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Closedropdown
      dropdownContent.classList.remove('active');
      dropdownBtn.classList.remove('active');
    }

    function closeFrame() {
      const viewer = document.getElementById('iframe-viewer');
      const frame = document.getElementById('tool-frame');
      frame.src = 'about:blank';
      viewer.style.display = 'none';
      // Scroll viewer in Sicht (falls nötig)
      viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // === Render-Funktion: zeigt zwei Aktionen pro Tool (open + frame) ===
    function render(category, query = '') {
      const container = document.getElementById(`${category}-grid`);
      const filtered = tools
        .filter(t => t.cat === category && (!query || t.name.toLowerCase().includes(query.toLowerCase())))
        .map(t => {
          const safeName = t.name.replace(/"/g, '&quot;');
          if (t.url) {
            const buttons = t.open_iframe === 'yes-open_yes-iframe'
              ? `<button class="ai-open-btn" onclick="openInFrame('${t.url.replace(/'/g, "%27")}')"> frame </button>
                 <a class="ai-open-btn" href="${t.url}" target="_blank" rel="noopener noreferrer"> open </a>`
              : `<a class="ai-open-btn" href="${t.url}" target="_blank" rel="noopener noreferrer"> open </a>`;

            return `
              <div style="padding:0.2rem; background:#1a1a1a; border-radius:6px; margin:0.2rem 0; display:flex; justify-content:space-between; align-items:center; gap:0.2rem;">
                <div style="flex:1;">
                  <a href="${t.url}" target="_blank" rel="noopener noreferrer" style="color:#f5f5f5; text-decoration:none; font-weight:600;">${safeName}</a>
                </div>
                <div style="display:flex; gap:0.5rem;controls-right">
                  ${buttons}
                </div>
              </div>
            `;
          } else {
            return `<div style="padding:0.5rem; color:#888;">${safeName}</div>`;
          }
        })
        .join('');
      container.innerHTML = filtered || '<div style="padding:0.5rem; color:#888;">Keine Tools gefunden.</div>';
    }

    // === Initiale Anzeige ===
    ['chat', 'search', 'local', 'externchat', 'externsearch'].forEach(cat => render(cat));

    // === Live-Suche ===
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      ['chat', 'search', 'local', 'externchat', 'externsearch'].forEach(cat => render(cat, q));
    });

    // === Initial Zustand: Dropdown eingeklappt ===
    dropdownContent.classList.remove('active');
    dropdownBtn.classList.remove('active');
  </script>
